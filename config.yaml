# Odyssey Shield — Anti-spam bot configuration

# ── Required ─────────────────────────────────────────────────────
bot_token: "8638093743:AAE41iz7rDwI3V8dc6YizGxBenvXPW7v5FM"

# Proxy for regions where Telegram API is blocked (e.g. Russia).
# Supports socks5://, http://, https://
# Leave empty to connect directly.
proxy_url: "socks5://9b26e160:66e9f07226@84.54.8.251:30042"
# Examples:
#   proxy_url: "socks5://127.0.0.1:1080"
#   proxy_url: "http://127.0.0.1:8080"

# Group / supergroup ID where moderation logs are posted.
# The bot must be a member of this chat.
log_channel_id: -1003469131826

# ── New-user strictness ──────────────────────────────────────────
# First N messages from any user are filtered with a 1.5× risk multiplier.
new_user_messages: 5

# ── Risk-score thresholds ────────────────────────────────────────
risk_thresholds:
  warn: 25   # delete message + short auto-deleted warning
  mute: 60   # delete + mute for mute_duration seconds
  ban:  80   # delete + permanent ban

# Mute duration in seconds (86400 = 24 hours)
mute_duration: 86400

# ── Trusted users / chats ────────────────────────────────────────
# User IDs that completely bypass all filters (admins, moderators).
trusted_users: []
  # - 123456789

# Telegram usernames (with or without @) that bypass all filters.
trusted_usernames: []
  # - "@durov"
  # - "durov"

# Chat IDs whose forwarded messages are treated as trustworthy.
trusted_chats: []
  # - -1001234567890

# ── Domain allow/block lists ─────────────────────────────────────
# Whitelisted domains lower the risk score by 10 per match.
whitelist_domains:
  - "example.com"        # your event website
  # - "t.me/your_bot"   # your ticket/promo bot

# Blacklisted domains add +30 risk per match.
blacklist_domains:
  - "bit.ly"
  - "tinyurl.com"
  - "goo.gl"
  - "ow.ly"
  - "cutt.ly"
  - "is.gd"
  - "rebrand.ly"

# Allowed t.me/+ invite links (your own channels).
allowed_invites: []
  # - "t.me/+YourOwnInviteHash"

# ── Night mode ───────────────────────────────────────────────────
night_mode:
  enabled: false
  start_hour: 23   # 23:00
  end_hour: 7      # 07:00
  risk_multiplier: 1.3

#proxy_url
services:
  warp:
    image: dublok/cloudflare-warp:latest
    container_name: warp-socks
    restart: always
    ports:
      - "1080:1080"      # SOCKS5 прокси
      # "8080:8080"      # HTTP прокси (если понадобится)
    volumes:
      - warp-data:/var/lib/cloudflare-warp

volumes:
  warp-data:
